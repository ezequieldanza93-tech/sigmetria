<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F8FA"/>
      <stop offset="100%" stop-color="#EFF5EF"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D33"/>
    </linearGradient>
    <clipPath id="rightClip">
      <rect x="740" y="0" width="460" height="630"/>
    </clipPath>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Panel derecho verde -->
  <rect x="740" y="0" width="460" height="630" fill="#2E7D33" opacity="0.96"/>

  <!-- Patrón geométrico panel derecho (triángulos) -->
  <g clip-path="url(#rightClip)" opacity="0.12">
    <polygon points="760,0 920,0 760,200" fill="#FFFFFF"/>
    <polygon points="1100,0 1200,0 1200,120" fill="#FFFFFF"/>
    <polygon points="760,400 960,400 760,630" fill="#FFFFFF"/>
    <polygon points="1000,500 1200,500 1200,630" fill="#FFFFFF"/>
    <polygon points="870,200 1070,200 870,450" fill="#FFFFFF"/>
  </g>

  <!-- Isotipo en panel derecho: triángulo dividido -->
  <g transform="translate(870, 200)">
    <!-- Mitad izquierda sólida -->
    <polygon points="0,130 65,0 65,130" fill="#FFFFFF" opacity="0.9"/>
    <!-- Mitad derecha solo contorno -->
    <polygon points="65,0 130,130 65,130" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.7"/>
  </g>

  <!-- Texto SIGMETRÍA HyS en panel derecho -->
  <text x="970" y="370" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="800" letter-spacing="4" fill="#FFFFFF" opacity="0.9"
        text-anchor="middle">SIGMETRÍA</text>
  <text x="970" y="393" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="400" letter-spacing="3" fill="#A5D6A7"
        text-anchor="middle">HyS</text>

  <!-- Barra verde izquierda (acento vertical) -->
  <rect x="60" y="80" width="5" height="440" fill="#4CAF50" rx="3"/>

  <!-- Badge categoría -->
  <rect x="80" y="100" width="240" height="28" rx="14" fill="#E8F5E9"/>
  <text x="200" y="119" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="700" letter-spacing="2.5" fill="#2E7D33"
        text-anchor="middle">CONSULTOR HyS · METODOLOGÍA</text>

  <!-- Título principal — línea 1 -->
  <text x="80" y="210" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="800" fill="#1A1A1A" letter-spacing="-0.5">CÓMO ORGANIZAR</text>

  <!-- Título — línea 2 -->
  <text x="80" y="275" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="800" fill="#2E7D33" letter-spacing="-0.5">LA GESTIÓN DE HyS</text>

  <!-- Título — línea 3 -->
  <text x="80" y="336" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="700" fill="#444444" letter-spacing="-0.3">con varios clientes</text>

  <!-- Descripción -->
  <text x="80" y="395" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="19" font-weight="300" fill="#666666">Un método para ordenar tu cartera sin depender</text>
  <text x="80" y="421" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="19" font-weight="300" fill="#666666">de la memoria ni de quince archivos abiertos.</text>

  <!-- Separador -->
  <rect x="80" y="460" width="580" height="1" fill="#D0D0D0"/>

  <!-- Footer izquierdo: tiempo lectura + fecha -->
  <circle cx="98" cy="497" r="3" fill="#4CAF50"/>
  <text x="112" y="502" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="600" letter-spacing="1.5" fill="#888888">3 MIN LECTURA</text>
  <text x="250" y="502" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="400" fill="#AAAAAA">·</text>
  <text x="265" y="502" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="400" letter-spacing="0.5" fill="#AAAAAA">9 JUN 2026</text>

  <!-- URL del sitio -->
  <text x="80" y="560" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="600" letter-spacing="1" fill="#4CAF50">sigmetria.com.ar</text>
</svg>
