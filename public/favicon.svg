<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo blanco para contraste en tabs oscuras -->
  <rect width="100" height="100" rx="18" fill="#ffffff"/>
  <!-- Mitad izquierda verde sólido -->
  <polygon points="50,8 8,92 50,92" fill="#4CAF50"/>
  <!-- Mitad derecha verde claro sólido -->
  <polygon points="50,8 92,92 50,92" fill="#C8E6C9"/>
  <!-- Línea divisoria -->
  <line x1="50" y1="8" x2="50" y2="92" stroke="#388E3C" stroke-width="2"/>
</svg>
