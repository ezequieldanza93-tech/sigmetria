<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F8FA"/>
      <stop offset="100%" stop-color="#EFF5EF"/>
    </linearGradient>
    <clipPath id="rightClip2">
      <rect x="720" y="0" width="480" height="630"/>
    </clipPath>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Panel derecho oscuro (founder story = más oscuro, más dramático) -->
  <rect x="720" y="0" width="480" height="630" fill="#1B5E20" opacity="0.97"/>

  <!-- Patrón panel derecho -->
  <g clip-path="url(#rightClip2)" opacity="0.1">
    <polygon points="720,0 960,0 720,280" fill="#FFFFFF"/>
    <polygon points="1100,0 1200,0 1200,150" fill="#FFFFFF"/>
    <polygon points="720,380 1000,380 720,630" fill="#FFFFFF"/>
    <polygon points="1050,480 1200,480 1200,630" fill="#FFFFFF"/>
  </g>

  <!-- Isotipo derecho -->
  <g transform="translate(850, 185)">
    <polygon points="0,140 70,0 70,140" fill="#FFFFFF" opacity="0.85"/>
    <polygon points="70,0 140,140 70,140" fill="none" stroke="#FFFFFF" stroke-width="3.5" opacity="0.6"/>
  </g>

  <!-- SIGMETRÍA HyS -->
  <text x="960" y="380" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="800" letter-spacing="4" fill="#FFFFFF" opacity="0.88"
        text-anchor="middle">SIGMETRÍA</text>
  <text x="960" y="403" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="400" letter-spacing="3" fill="#81C784"
        text-anchor="middle">HyS</text>

  <!-- Quote en panel derecho -->
  <text x="960" y="490" font-family="Georgia, 'Times New Roman', serif"
        font-size="52" fill="#4CAF50" opacity="0.4" text-anchor="middle">"</text>
  <text x="960" y="530" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="300" letter-spacing="1" fill="#A5D6A7" opacity="0.8"
        text-anchor="middle">HISTORIA DEL FUNDADOR</text>

  <!-- Acento verde izquierda -->
  <rect x="60" y="80" width="5" height="420" fill="#4CAF50" rx="3"/>

  <!-- Badge -->
  <rect x="80" y="100" width="200" height="28" rx="14" fill="#E8F5E9"/>
  <text x="180" y="119" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="700" letter-spacing="2.5" fill="#2E7D33"
        text-anchor="middle">FUNDADOR · SIGMETRÍA</text>

  <!-- Título línea 1 -->
  <text x="80" y="212" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="46" font-weight="800" fill="#1A1A1A" letter-spacing="-0.5">CONSTRUÍ UNA APP</text>

  <!-- Título línea 2 -->
  <text x="80" y="268" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="46" font-weight="800" fill="#2E7D33" letter-spacing="-0.5">DE HyS PORQUE</text>

  <!-- Título línea 3 -->
  <text x="80" y="322" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="700" fill="#444444" letter-spacing="-0.3">no existía la que necesitaba</text>

  <!-- Descripción -->
  <text x="80" y="382" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="17" font-weight="300" fill="#666666">Tres carpetas desordenadas, una apuesta,</text>
  <text x="80" y="406" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="17" font-weight="300" fill="#666666">una certificación y la decisión de construirlo.</text>

  <!-- Separador -->
  <rect x="80" y="438" width="560" height="1" fill="#D0D0D0"/>

  <!-- Footer -->
  <circle cx="98" cy="467" r="3" fill="#4CAF50"/>
  <text x="112" y="472" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="700" letter-spacing="1.5" fill="#888888">POR EL EQUIPO DE SIGMETRÍA</text>
  <text x="280" y="472" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#AAAAAA">·</text>
  <text x="294" y="472" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="400" letter-spacing="0.5" fill="#AAAAAA">6 MIN LECTURA</text>

  <!-- URL -->
  <text x="80" y="545" font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="600" letter-spacing="1" fill="#4CAF50">sigmetria.com.ar</text>
</svg>
