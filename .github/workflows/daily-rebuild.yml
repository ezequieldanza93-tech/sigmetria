name: Daily rebuild (auto-publish scheduled posts)

# Rebuilds the Astro site every day at 8am ART (11:00 UTC).
# Posts with `fecha <= today` and no `oculto: true` will appear in the next build.
#
# Setup (one time):
#   1. Vercel → project sigmetria-hys → Settings → Git → Deploy Hooks → "Daily rebuild"
#   2. Copy the hook URL
#   3. GitHub repo → Settings → Secrets and variables → Actions → New secret
#      Name: VERCEL_DEPLOY_HOOK_URL  |  Value: <paste the URL>

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 ART (UTC-3)
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP %{http_code}\n"
